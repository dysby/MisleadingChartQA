<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        #chart { width: 1000px; height: 750px; margin: 60px auto; }
        .line { fill: none; stroke: steelblue; stroke-width: 3px; }
        .axis path, .axis line { stroke: black; }
    </style>
</head>
<body>
    <h1>Stable Revenue of Company C from Q1 to Q4</h1>
    <div id="chart"></div>
    <script>
        const margin = {top: 40, right: 20, bottom: 40, left: 60};
        const width = 1000 - margin.left - margin.right;
        const height = 750 - margin.top - margin.bottom;
        const g = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);
        const data = [
            {"quarter": "Q1", "revenue": 1076},
            {"quarter": "Q2", "revenue": 1326},
            {"quarter": "Q3", "revenue": 1483},
            {"quarter": "Q4", "revenue": 1841}
        ];
        const x = d3.scalePoint().domain(data.map(d => d.quarter)).range([0, width]);
        const y = d3.scaleLinear().domain([0, 2025.1000000000001]).range([height, 0]);
        const line = d3.line().x(d => x(d.quarter)).y(d => y(d.revenue));
        g.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x));
        g.append("g").call(d3.axisLeft(y));
        g.append("text").attr("x", width/2).attr("y", height + 35).attr("text-anchor", "middle").text("Quarter");
        g.append("text").attr("transform", "rotate(-90)").attr("x", -height/2).attr("y", -45).attr("text-anchor", "middle").text("Revenue");
        g.append("path").datum(data).attr("class", "line").attr("d", line);
    </script>
</body>
</html>
