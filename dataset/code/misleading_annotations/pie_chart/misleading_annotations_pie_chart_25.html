<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        #chart { width: 1000px; height: 750px; margin: 60px auto; }
        .slice-text { font-size: 14px; font-weight: bold; fill: white; }
        .legend text { font-size: 12px; }
    </style>
</head>
<body>
    <h1>Preferred Time for Reading for People in County Z</h1>
    <div id="chart"></div>
    <script>
        const width = 800, height = 700, radius = Math.min(width, height) / 2;
        const svg = d3.select("#chart").append("svg").attr("width", width + 200).attr("height", height + 50)
            .append("g").attr("transform", `translate(${width/2}, ${height/2})`);
        const color = d3.scaleOrdinal().domain(["Morning", "Night"]).range(["#D9534F", "#D3D3D3"]);
        const data = [
            {"label": "Morning", "value": 42},
            {"label": "Night", "value": 58}
        ];
        const pie = d3.pie().value(d => d.value);
        const arc = d3.arc().innerRadius(0).outerRadius(radius);
        svg.selectAll("path").data(pie(data)).enter().append("path").attr("d", arc).attr("fill", d => color(d.data.label));
        svg.selectAll("text.slice-text").data(pie(data)).enter().append("text").attr("class", "slice-text")
            .attr("transform", d => `translate(${arc.centroid(d)})`).attr("text-anchor", "middle").text(d => `${d.data.value}%`);
        const legend = svg.append("g").attr("transform", `translate(${radius + 20}, ${-radius})`);
        legend.selectAll("rect").data(data).enter().append("rect").attr("x", 0).attr("y", (d,i) => i*25).attr("width", 18).attr("height", 18).attr("fill", d => color(d.label));
        legend.selectAll("text").data(data).enter().append("text").attr("x", 25).attr("y", (d,i) => i*25+13).text(d => d.label);
    </script>
</body>
</html>
