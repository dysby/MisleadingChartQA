<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Revenue at Cafe C in District D</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        #chart { width: 1000px; height: 750px; margin: 60px auto; }
        .bar { fill: steelblue; }
        .avg-line { stroke: black; stroke-dasharray: 4,4; stroke-width: 2px; }
        .annotation { font-size: 12px; font-weight: bold; fill: black; }
        .axis path, .axis line { stroke: black; }
    </style>
</head>
<body>
    <h1>Weekly Revenue at Cafe C in District D</h1>
    <div id="chart"></div>
    <script>
        const margin = {top: 40, right: 20, bottom: 40, left: 60};
        const width = 1000 - margin.left - margin.right;
        const height = 750 - margin.top - margin.bottom;
        const g = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);
        const data = [
            {"week": "Week 1", "revenue": 220},
            {"week": "Week 2", "revenue": 223},
            {"week": "Week 3", "revenue": 272},
            {"week": "Week 4", "revenue": 479}
        ];
        const x = d3.scaleBand().domain(data.map(d => d.week)).range([0, width]).padding(0.3);
        const y = d3.scaleLinear().domain([0, 550.8499999999999]).range([height, 0]);
        g.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x));
        g.append("g").call(d3.axisLeft(y));
        g.append("text").attr("x", width/2).attr("y", height + 35).attr("text-anchor", "middle").text("Week");
        g.append("text").attr("transform", "rotate(-90)").attr("x", -height/2).attr("y", -45).attr("text-anchor", "middle").text("Revenue");
        g.selectAll(".bar").data(data).enter().append("rect").attr("class", "bar")
            .attr("x", d => x(d.week)).attr("y", d => y(d.revenue))
            .attr("width", x.bandwidth()).attr("height", d => height - y(d.revenue));
        g.append("line").attr("class", "avg-line").attr("x1", 0).attr("y1", y(479)).attr("x2", width).attr("y2", y(479));
        g.append("text").attr("class", "annotation").attr("x", width - 10).attr("y", y(479) - 10).attr("text-anchor", "end").text("Average");
    </script>
</body>
</html>
