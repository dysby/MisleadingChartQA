<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        #chart { width: 1000px; height: 750px; margin: 60px auto; }
        .line { fill: none; stroke: steelblue; stroke-width: 3px; }
        .axis path, .axis line { stroke: black; }
    </style>
</head>
<body>
    <h1>Increasing Production at Factory F from 2018 to 2023</h1>
    <div id="chart"></div>
    <script>
        const margin = {top: 40, right: 20, bottom: 40, left: 60};
        const width = 1000 - margin.left - margin.right;
        const height = 750 - margin.top - margin.bottom;
        const g = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);
        const data = [
            {"year": "2018", "production": 3302},
            {"year": "2019", "production": 3147},
            {"year": "2020", "production": 2321},
            {"year": "2021", "production": 1992},
            {"year": "2022", "production": 2294},
            {"year": "2023", "production": 1823}
        ];
        const x = d3.scalePoint().domain(data.map(d => d.year)).range([0, width]);
        const y = d3.scaleLinear().domain([0, 3632.2000000000003]).range([height, 0]);
        const line = d3.line().x(d => x(d.year)).y(d => y(d.production));
        g.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x));
        g.append("g").call(d3.axisLeft(y));
        g.append("text").attr("x", width/2).attr("y", height + 35).attr("text-anchor", "middle").text("Year");
        g.append("text").attr("transform", "rotate(-90)").attr("x", -height/2).attr("y", -45).attr("text-anchor", "middle").text("Production");
        g.append("path").datum(data).attr("class", "line").attr("d", line);
    </script>
</body>
</html>
