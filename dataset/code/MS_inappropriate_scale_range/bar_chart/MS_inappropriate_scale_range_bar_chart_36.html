<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Energy Usage (kWh)</title>
  <script src="https://d3js.org/d3.v6.min.js"></script>
  <style>
    #chart {
      width: 1000px;
      height: 750px;
      margin: 60px auto;
    }
    .bar { fill: #8B0000; }
    .axis path, .axis line { stroke: #000; }
    .axis-label { font-size: 14px; font-weight: bold; text-anchor: middle; }
  </style>
</head>
<body>
  <h1>Monthly Energy Usage (kWh)</h1>
  <div id="chart"></div>
  <script>
    const margin = {top: 40, right: 30, bottom: 50, left: 80};
    const width = 1000 - margin.left - margin.right;
    const height = 750 - margin.top - margin.bottom;

    const svg = d3.select("#chart").append("svg")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom);

    const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    d3.csv("../../../../data/MS_inappropriate_scale_range/bar_chart/MS_inappropriate_scale_range_bar_chart_36.csv").then(data => {
      data.forEach(d => d.kWh = +d.kWh);

      const x = d3.scaleBand()
        .domain(data.map(d => d.Month))
        .range([0, width])
        .padding(0.2);

      const y = d3.scaleLinear()
        .domain([17577.21657376954, d3.max(data, d => d.kWh)])
        .range([height, 0]);

      g.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x));
      g.append("g").call(d3.axisLeft(y).ticks(6).tickFormat(d3.format(",.0f")));

      svg.append("text")
        .attr("class", "axis-label")
        .attr("x", width / 2 + margin.left)
        .attr("y", height + margin.top + 40)
        .text("Month");

      svg.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -height / 2 - margin.top)
        .attr("y", margin.left - 60)
        .text("Energy Usage (kWh)");

      g.selectAll(".bar")
        .data(data)
        .enter().append("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.Month))
        .attr("y", d => y(d.kWh))
        .attr("height", d => height - y(d.kWh))
        .attr("width", x.bandwidth());
    }).catch(err => console.error('Error loading CSV data:', err));
  </script>
</body>
</html>
