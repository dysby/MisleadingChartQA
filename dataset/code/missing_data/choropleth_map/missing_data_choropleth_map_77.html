<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unemployment Rate by Country</title>
  <script src="https://d3js.org/d3.v6.min.js"></script>
  <script src="https://d3js.org/topojson.v3.min.js"></script>
  <style>
    #chart {
      width: 1000px;
      height: 750px;
      margin: 60px auto;
    }
    path {
      stroke: #fff;
    }
    .legend {
      font-size: 12px;
    }
    .region-label {
      font-size: 24px;
      fill: black;
      font-weight: bold;
    }
    .missing-data {
      fill: #ccc;
    }
  </style>
</head>
<body>
  <h1>Average Unemployment Rate over 10 Years</h1>
  <div id="chart">
    <svg width="1000" height="750"></svg>
  </div>
  <script>
    const width = 1000, height = 750;
    const svg = d3.select("svg");

    const projection = d3.geoNaturalEarth1()
      .scale(220)
      .translate([width / 2.5, height / 2]);

    const path = d3.geoPath().projection(projection);

    d3.json("https://d3js.org/world-110m.v1.json").then(world => {
      d3.csv("../../../../data/missing_data/choropleth_map/missing_data_choropleth_map_77.csv").then(data => {
        const countries = topojson.feature(world, world.objects.countries).features;

        const colorScale = d3.scaleThreshold()
          .domain([3, 6, 9, 12])
          .range(["#edf8fb", "#b3cde3", "#8c96c6", "#8856a7", "#810f7c"]);

        const valuesById = {};
        data.forEach(d => {
          valuesById[d.id] = +d.unemployment_rate;
        });

        svg.selectAll("path")
          .data(countries)
          .join("path")
          .attr("d", path)
          .attr("fill", d => {
            const v = valuesById[d.id];
            // Missing data is encoded as 0 in CSV; we render those as grey.
            if (v === 0) {
              return "#ccc";
            }
            return v ? colorScale(v) : "#ccc";
          });

        // Only show labels for key regions (A, B, C, D, E)
        svg.selectAll(".region-label")
          .data(data.filter(d => ['A','B','C','D','E'].includes(d.note)))
          .join("text")
          .attr("class", "region-label")
          .attr("x", d => {
            const coords = projection([+d.longitude, +d.latitude]);
            return coords ? coords[0] : -10;
          })
          .attr("y", d => {
            const coords = projection([+d.longitude, +d.latitude]);
            return coords ? coords[1] : -10;
          })
          .text(d => d.note);

        const legendWidth = 300;
        const legendHeight = 20;
        const legendX = 500;
        const legendY = 550;

        const legendData = [{color: "#edf8fb", label: "0–3%"}, {color: "#b3cde3", label: "3–6%"}, {color: "#8c96c6", label: "6–9%"}, {color: "#8856a7", label: "9%+"}, {color: "#ccc", label: "No data"}];

        svg.selectAll(".legend-rect")
          .data(legendData)
          .join("rect")
          .attr("class", "legend-rect")
          .attr("x", (d, i) => legendX + i * (legendWidth / legendData.length))
          .attr("y", legendY)
          .attr("width", legendWidth / legendData.length - 2)
          .attr("height", legendHeight)
          .attr("fill", d => d.color)
          .attr("stroke", "#000");

        svg.selectAll(".legend-label")
          .data(legendData)
          .join("text")
          .attr("class", "legend-label")
          .attr("x", (d, i) => legendX + i * (legendWidth / legendData.length) + (legendWidth / legendData.length) / 2)
          .attr("y", legendY + legendHeight + 15)
          .attr("text-anchor", "middle")
          .style("font-size", "10px")
          .text(d => d.label);

        svg.append("text")
          .attr("x", legendX + legendWidth / 2)
          .attr("y", legendY - 10)
          .attr("text-anchor", "middle")
          .style("font-size", "12px")
          .style("font-weight", "bold")
          .text("Unemployment Rate (%)");
      }).catch(err => console.error('Error loading CSV data:', err));
    }).catch(err => console.error('Error loading world data:', err));
  </script>
</body>
</html>
